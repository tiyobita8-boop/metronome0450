<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Metronome Timer</title>

<style>
#arm {
  width: 4px;
  height: 120px;
  background: black;
  margin: 40px auto;
  transform-origin: bottom center;
  transition: transform 0.1s linear;
}
</style>

</head>

<body style="text-align:center; font-family:sans-serif;">

<h1>🎵 メトロノーム + タイマー</h1>

<p style="color:red; font-weight:bold;">
※ iPhoneで音が出ない場合は、サイレントモード（消音）をオフにしてください
</p>

<div id="arm"></div>

<h2 id="status">停止中</h2>
<h2 id="timer">4:50</h2>

<label>BPM:</label>
<input type="number" id="bpm" value="60" style="width:60px;">

<br><br>

<button onclick="setMode(290)">4分50秒</button>
<button onclick="setMode(60)">1分</button>
<button onclick="setMode(30)">30秒</button>

<br><br>

<button onclick="start()">▶ スタート</button>
<button onclick="stop()">⏹ ストップ</button>
<button onclick="reset()">🔄 リセット</button>

<script>

let metroInterval;
let timerInterval;
let audioCtx;

let duration = 290;
let remaining = 290;

let direction = 1;

// 🔥 カチカチ音（変更ポイント）
function playClick(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square"; // ←ここ重要（カチッとした音）
  osc.frequency.value = 1500;

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  // 超短い鋭い音にする
  gain.gain.setValueAtTime(1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);

  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.03);

  // アニメーション同期
  direction *= -1;
  document.getElementById("arm").style.transform =
    `rotate(${direction * 30}deg)`;
}

// 🔥終了音（チンチン）
function playEndSound(){
  for(let i = 0; i < 2; i++){
    setTimeout(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.frequency.value = 2000;
      gain.gain.setValueAtTime(1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.3);

    }, i * 300);
  }
}

function updateTimer(){
  let min = Math.floor(remaining / 60);
  let sec = remaining % 60;

  document.getElementById("timer").innerText =
    min + ":" + sec.toString().padStart(2, '0');

  if(remaining <= 0){
    stop();
    playEndSound();
    return;
  }

  remaining--;
}

function start(){
  if(metroInterval) return;

  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  let bpm = document.getElementById("bpm").value;
  let intervalTime = 60000 / bpm;

  document.getElementById("status").innerText = "再生中";

  playClick();
  updateTimer();

  metroInterval = setInterval(playClick, intervalTime);
  timerInterval = setInterval(updateTimer, 1000);
}

function stop(){
  clearInterval(metroInterval);
  clearInterval(timerInterval);

  metroInterval = null;
  timerInterval = null;

  document.getElementById("status").innerText = "停止中";
}

function reset(){
  stop();
  remaining = duration;
  updateDisplay();
}

function setMode(sec){
  stop();
  duration = sec;
  remaining = sec;
  updateDisplay();
}

function updateDisplay(){
  let min = Math.floor(remaining / 60);
  let sec = remaining % 60;

  document.getElementById("timer").innerText =
    min + ":" + sec.toString().padStart(2, '0');
}

</script>

</body>
</html>
